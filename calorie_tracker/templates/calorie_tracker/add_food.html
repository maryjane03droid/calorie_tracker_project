{% extends 'calorie_tracker/base.html' %}

{% block content %}
<div class="bg-white p-6 rounded shadow">
    <h2 class="text-xl font-bold mb-4">Add Food Item</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded">
            Save
        </button>
    </form>
</div>
{% endblock %}
